<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leapmotor AI Assistant</title>

    <style>
        background: #0b6b1b;
        border-radius: 999px;
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 0;
            transition: grid-template-columns 0.3s ease;
            min-height: 100vh;
        }

        .layout.chat-open {
            grid-template-columns: 1fr 420px;
        }

        .website {
            padding: 40px;
            transition: all 0.3s ease;
        }

        .chat-sidebar {
            background: white;
            border-left: 1px solid #ddd;
            overflow: hidden;
            height: 100vh;
            position: sticky;
            top: 0;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
        }

        .chat-body {
            padding: 20px;
        }

        .open-chat-btn {
            padding: 12px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        /* FLOATING CHAT BUTTON */

#chatLauncher {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 99999;

    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.chat-popup {

    background: rgba(255,255,255,0.92);

    backdrop-filter: blur(16px);

    border-radius: 18px;

    padding: 14px 16px;

    width: 270px;

    margin-bottom: 12px;

    box-shadow:
        0 8px 28px rgba(0,0,0,0.14);

    border:
        1px solid rgba(255,255,255,0.5);

    animation: fadeIn 0.3s ease;
}

.popup-header {
    font-size: 12px;
    font-weight: bold;

    display: flex;
    justify-content: space-between;
    align-items: center;

    margin-bottom: 6px;
}

.popup-body {
    font-size: 14px;
    color: #444;
}

.close-popup {
    cursor: pointer;
    font-size: 18px;
}

.chat-button {

    background: rgba(20,20,20,0.92);

    backdrop-filter: blur(14px);

    color: white;

    border: 1px solid rgba(255,255,255,0.08);

    border-radius: 999px;

    padding: 14px 22px;

    display: flex;
    align-items: center;
    gap: 16px;

    font-size: 16px;
    font-weight: 500;

    cursor: pointer;

    box-shadow:
        0 8px 24px rgba(0,0,0,0.22);

    transition:
        transform 0.25s ease,
        background 0.25s ease,
        box-shadow 0.25s ease;
}

.chat-button:hover {

    transform: translateY(-2px);

    background: rgba(35,35,35,0.96);

    box-shadow:
        0 12px 28px rgba(0,0,0,0.28);
}

.chat-button:hover {
    transform: translateY(-2px);
}

.chat-icon-wrapper {
    position: relative;
    font-size: 24px;
}

.notification-badge {

    position: absolute;

    top: -5px;
    right: -8px;

    background: #ff3b30;

    color: white;

    width: 18px;
    height: 18px;

    border-radius: 50%;

    font-size: 11px;

    font-weight: 600;

    display: flex;
    align-items: center;
    justify-content: center;

    border: 2px solid rgba(20,20,20,0.92);
}

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

    </style>

</head>

<body>

<div id="layout" class="layout">

    <div class="website">

        <h1>Leapmotor Demo Website</h1>

        <p>
            Questo è un sito demo per testare Agentforce.
        </p>

        <button class="open-chat-btn" onclick="toggleChat()">
            Open AI Assistant
        </button>

    </div>

    <div class="chat-sidebar">

        <div class="chat-header">
            Leapmotor AI Assistant
        </div>

        <div class="chat-body">

            Qui inserirai:
            <ul>
                <li>Embedded Messaging</li>
                <li>LWC</li>
                <li>Cards</li>
                <li>Carousel auto</li>
            </ul>

        </div>

    </div>

</div>

<script>

function toggleChat() {

    const layout = document.getElementById('layout');

    layout.classList.toggle('chat-open');
}

function closePopup() {

    const popup = document.querySelector('.chat-popup');

    if (popup) {
        popup.style.display = 'none';
    }
}

function toggleChat() {

    const layout = document.getElementById('layout');

    layout.classList.toggle('chat-open');
}


</script>
<!-- Floating Chat Button -->
<div id="chatLauncher">

    <div class="chat-popup">
        <div class="popup-header">
            BENVENUTO 😊
            <span class="close-popup" onclick="closePopup()">×</span>
        </div>

        <div class="popup-body">
            Un consulente è disponibile in chat ora!
        </div>
    </div>

    <button class="chat-button" onclick="toggleChat()">

        <span>Chatta con noi</span>

        <div class="chat-icon-wrapper">

            <div class="notification-badge">1</div>

            💬

        </div>

    </button>

</div>
</body>
</html>
